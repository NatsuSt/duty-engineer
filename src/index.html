<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duty Engineer Widget</title>
    <script type="module" src="/main.js" defer></script>
<!--    <script src="/main.js"></script>-->
    <link rel="stylesheet" href="/assets/css/tailwind.css">
    <link rel="stylesheet" href="/assets/css/all.min.css">
    <style>
        body {
            background: transparent;
            margin: 0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .widget-card {
            width: 320px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease;
        }
        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #22c55e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 8px #22c55e;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .drag-handle {
            cursor: grab;
            user-select: none;
            appearance: none;
        }
        .drag-handle:active {
            cursor: grabbing;
        }
    </style>
</head>
<body class="bg-gray-100/10">
    <div id="widget" class="widget-card overflow-hidden">
        <!-- Header -->
        <div class="bg-slate-800 p-3 flex justify-between items-center drag-handle" data-tauri-drag-region>
            <div class="flex items-center" data-tauri-drag-region>
                <span class="status-dot" data-tauri-drag-region></span>
                <span class="text-white text-xs font-bold uppercase tracking-wider" data-tauri-drag-region>Черговий Інженер</span>
            </div>
            <div class="flex gap-2" data-tauri-drag-region>
                <button id="minimizeButton" class="text-gray-400 hover:text-white transition-colors">
                    <i class="fas fa-minus text-xs"></i>
                </button>
            </div>
        </div>

        <!-- Content -->
        <div class="p-4">
            <div class="flex items-center gap-4 mb-4">
                <div class="h-12 w-12 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 text-xl font-bold border border-blue-200">
                    <i class="fas fa-user-gear"></i>
                </div>
                <div>
                    <h2 id="eng-name" class="font-bold text-gray-800 text-lg leading-tight">Александр Волков</h2>
                    <p class="text-xs text-gray-500 font-medium">Інженер пульту</p>
                </div>
            </div>

            <div class="space-y-2">
                <!-- Phone -->
                <div class="flex items-center justify-between bg-gray-50 p-2 rounded-lg border border-gray-100 group">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-phone text-blue-500 text-sm"></i>
                        <span id="phone-val" class="text-sm font-mono text-gray-700">+38 (050) 123-45-67</span>
                    </div>
                    <button id="phone-call" class="opacity-0 group-hover:opacity-100 transition-opacity text-gray-400 hover:text-blue-600">
                        <i class="fas fa-phone"></i>
                    </button>
                </div>

                <!-- Viber -->
                <!-- <div class="flex items-center justify-between bg-gray-50 p-2 rounded-lg border border-gray-100 group">
                    <div class="flex items-center gap-3">
                        <i class="fab fa-viber text-violet-500 text-sm"></i>
                        <span id="tg-val" class="text-sm font-mono text-gray-700">@avolkov_ops</span>
                    </div>
                    <button onclick="copyToClipboard('tg-val')" class="opacity-0 group-hover:opacity-100 transition-opacity text-gray-400 hover:text-sky-600">
                        <i class="far fa-copy"></i>
                    </button>
                </div> -->

            <!-- Footer Info -->
            <div class="mt-4 pt-3 border-t border-gray-100 flex justify-between items-center">
                <div class="text-[10px] text-gray-400">
                    Рокемендуємо дзвонити до: <span class="font-bold text-gray-600">23:00 (Київ)</span>
                </div>
                <!-- <div class="text-[10px] bg-blue-50 text-blue-600 px-2 py-0.5 rounded font-bold">
                    ID: 4429
                </div> -->
            </div>
        </div>
    </div>
</body>
</html>
